rule_id: RULE-ANDROID-APP-010
title: APP 静态字段持有 Activity、View 或短生命周期 Context
category: resource
severity: warning

source:
  type: typical_case
  refs:
    - https://developer.android.com/topic/performance/memory
    - https://developer.android.com/reference/android/content/Context

applies_to:
  languages: [java, kotlin]
  paths: ["**/*.java", "**/*.kt"]
  exclude_paths: ["**/test/**", "**/androidTest/**", "**/*Test.java", "**/*Test.kt"]

recall:
  keywords:
    - "static Activity"
    - "static Context"
    - "companion object"
    - "lateinit var"
  regexes:
    - "static\\s+.*\\b(Activity|Fragment|View|Context)\\b"
    - "companion\\s+object[\\s\\S]*\\b(Activity|Fragment|View|Context)\\b"

trigger:
  description: |
    新增 static/companion object/singleton 字段持有 Activity、Fragment、View 或
    由它们传入的 Context,且没有使用 applicationContext 或弱引用。
  signals:
    - "static Activity/Context/View 字段"
    - "companion object 中保存 Activity、View、Fragment 或 callback"
    - "单例 init(context) 直接保存传入 Context,未调用 getApplicationContext()"

risk: |
  长生命周期对象持有短生命周期 UI 对象会阻止页面释放,导致内存泄漏、
  旧页面继续接收回调,严重时 OOM。

suggestion: |
  单例只保存 applicationContext。UI 对象引用放在生命周期实例内,
  必要时在 onDestroy/onCleared 中置空。不要用 static 保存 Activity/View。

original_case:
  bug_link: null
  minimal_repro: |
    private static Activity sActivity;
    static void init(Activity activity) { sActivity = activity; }
  fix_diff: |
    - private static Activity sActivity;
    + private static Context sAppContext;
    + static void init(Context context) { sAppContext = context.getApplicationContext(); }
